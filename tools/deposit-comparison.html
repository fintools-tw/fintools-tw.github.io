<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>定存利率比較器 | FinTools Pro</title>
<meta name="description" content="一鍵比較台灣8大銀行定存利率，輸入金額與期間，立刻看到各家利息排名。2026年最新利率。"/>
<link rel="icon" href="/favicon.ico" sizes="256x256" type="image/x-icon"/>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 antialiased min-h-screen">
<nav class="sticky top-0 z-50 bg-white/80 backdrop-blur border-b border-gray-200">
  <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
    <a href="/" class="text-xl font-bold text-indigo-600">💰 FinTools Pro</a>
    <div class="flex items-center gap-6 text-sm">
      <a href="/tools/" class="text-indigo-600 font-semibold">工具</a>
      <a href="/blog/" class="hover:text-indigo-600 transition">文章</a>
    </div>
  </div>
</nav>
<main class="max-w-3xl mx-auto px-4 py-12">
  <a href="/tools/" class="text-indigo-600 text-sm hover:underline">← 返回工具列表</a>
  <h1 class="text-3xl font-extrabold mt-4 mb-2">🏦 定存利率比較器</h1>
  <p class="text-gray-500 mb-8">比較台灣 8 大銀行定存利率，找出最划算的方案（2026 年近似利率）</p>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6 md:p-8 space-y-6">
    <div>
      <label class="block text-sm font-semibold mb-1">存款金額（元）</label>
      <input id="amount" type="number" min="0" step="1000" value="1000000" placeholder="例如：1000000" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none"/>
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">存款期間</label>
      <select id="period" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none">
        <option value="1">1 個月</option>
        <option value="3">3 個月</option>
        <option value="6" selected>6 個月</option>
        <option value="9">9 個月</option>
        <option value="12">1 年</option>
        <option value="24">2 年</option>
        <option value="36">3 年</option>
      </select>
    </div>
    <div>
      <label class="block text-sm font-semibold mb-1">計息方式</label>
      <select id="method" class="w-full border border-gray-300 rounded-lg px-4 py-3 text-lg focus:ring-2 focus:ring-indigo-400 focus:border-indigo-400 outline-none">
        <option value="fixed">定期存款（整存整付）</option>
        <option value="monthly">定期存款（按月付息）</option>
      </select>
    </div>
    <button onclick="calc()" class="w-full py-3 bg-indigo-600 text-white font-bold rounded-xl text-lg hover:bg-indigo-700 transition">比較</button>
  </div>

  <div id="result" class="hidden mt-8">
    <h2 class="text-xl font-bold mb-4">📊 利息比較排名</h2>
    <p class="text-xs text-gray-400 mb-4">利率為 2026 年近似固定利率，實際利率請以各銀行公告為準。利息未扣除 10% 利息所得稅（每人每年 NT$27 萬免稅額度內免扣）。</p>
    <div class="overflow-x-auto">
      <table class="w-full bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
        <thead><tr class="bg-gray-50 text-sm text-gray-500"><th class="py-3 px-4 text-left">排名</th><th class="py-3 px-4 text-left">銀行</th><th class="py-3 px-4 text-right">年利率</th><th class="py-3 px-4 text-right">利息收入</th><th class="py-3 px-4 text-right">到期總額</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <div id="summary" class="mt-6 bg-indigo-50 rounded-xl p-4 text-sm"></div>
  </div>
</main>

<footer class="bg-gray-900 text-gray-400 py-8 mt-20">
  <div class="max-w-6xl mx-auto px-4 text-center text-sm">© 2025 FinTools Pro. All rights reserved.</div>
</footer>

<script>
// 2026 approximate rates (annual %) by period in months
// Sources: approximate from major Taiwan bank websites
const banks=[
  {name:'台灣銀行',rates:{1:1.04,3:1.09,6:1.18,9:1.22,12:1.34,24:1.37,36:1.37}},
  {name:'中國信託',rates:{1:0.93,3:1.05,6:1.18,9:1.23,12:1.35,24:1.35,36:1.35}},
  {name:'國泰世華',rates:{1:0.91,3:1.03,6:1.15,9:1.20,12:1.33,24:1.33,36:1.33}},
  {name:'玉山銀行',rates:{1:0.93,3:1.05,6:1.17,9:1.22,12:1.34,24:1.35,36:1.35}},
  {name:'富邦銀行',rates:{1:0.91,3:1.03,6:1.16,9:1.21,12:1.33,24:1.34,36:1.34}},
  {name:'第一銀行',rates:{1:1.04,3:1.09,6:1.18,9:1.22,12:1.34,24:1.37,36:1.37}},
  {name:'合作金庫',rates:{1:1.04,3:1.09,6:1.18,9:1.22,12:1.34,24:1.37,36:1.37}},
  {name:'華南銀行',rates:{1:1.04,3:1.09,6:1.18,9:1.22,12:1.34,24:1.37,36:1.37}},
];

function calc(){
  const amount=parseFloat(document.getElementById('amount').value);
  const period=parseInt(document.getElementById('period').value);
  if(!amount||amount<=0){alert('請輸入有效金額');return;}

  const results=banks.map(b=>{
    const rate=b.rates[period]||1.0;
    const months=period;
    // simple interest for the period
    const interest=Math.round(amount*(rate/100)*(months/12));
    return {name:b.name,rate,interest,total:amount+interest};
  });

  results.sort((a,b)=>b.interest-a.interest);

  const medals=['🥇','🥈','🥉'];
  let html='';
  results.forEach((r,i)=>{
    const rank=i<3?medals[i]:(i+1);
    const highlight=i===0?'bg-yellow-50 font-semibold':'';
    html+=`<tr class="border-b border-gray-50 ${highlight}"><td class="py-3 px-4">${rank}</td><td class="py-3 px-4">${r.name}</td><td class="py-3 px-4 text-right">${r.rate.toFixed(2)}%</td><td class="py-3 px-4 text-right text-green-600 font-semibold">$${r.interest.toLocaleString()}</td><td class="py-3 px-4 text-right">$${r.total.toLocaleString()}</td></tr>`;
  });
  document.getElementById('tableBody').innerHTML=html;

  const best=results[0];
  const worst=results[results.length-1];
  const diff=best.interest-worst.interest;
  document.getElementById('summary').innerHTML=`💡 <strong>${best.name}</strong>利息最高（$${best.interest.toLocaleString()}），比最低的<strong>${worst.name}</strong>多 <strong>$${diff.toLocaleString()}</strong>。存 ${amount>=10000?(amount/10000).toFixed(0)+'萬':amount.toLocaleString()+'元'}、${period>=12?(period/12)+'年':period+'個月'}期定存。`;

  document.getElementById('result').classList.remove('hidden');
}

// auto-calc on load
calc();
</script>
</body>
</html>
